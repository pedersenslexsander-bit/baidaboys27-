<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAIDABOYS CHUG WHEEL V12</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070006;color:white;font-family:Arial Black,Impact,Arial,sans-serif;touch-action:manipulation}body{background:radial-gradient(circle at 50% 45%,#410017 0%,#120014 50%,#000 100%)}#app{width:100vw;height:100dvh;position:relative;display:flex;align-items:center;justify-content:center;padding:6px;overflow:hidden}#brand{position:fixed;top:10px;right:10px;z-index:50;background:#d60000;color:#fff;padding:7px 12px;border-radius:10px;font-size:clamp(11px,3vw,15px);letter-spacing:2px;box-shadow:0 0 18px #f00;text-shadow:0 0 8px #fff}.wheelStage{position:relative;width:min(94vw,74vh);height:min(94vw,74vh);max-width:720px;max-height:720px;filter:drop-shadow(0 0 24px #ff0055);transition:opacity .25s,transform .25s}#wheelCanvas{width:100%;height:100%;border-radius:50%;border:7px solid white;box-shadow:0 0 25px #fff,0 0 70px #ff004c,inset 0 0 40px #000;background:#111}.pointer{position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;z-index:12;filter:drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px #ff004c)}.pointer.top{top:-8px;border-left:24px solid transparent;border-right:24px solid transparent;border-top:48px solid #fff}.pointer.bottom{bottom:-8px;border-left:24px solid transparent;border-right:24px solid transparent;border-bottom:48px solid #fff}#center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:27%;height:27%;border-radius:50%;background:#100008;border:5px solid white;z-index:15;display:flex;align-items:center;justify-content:center;text-align:center;font-size:clamp(15px,4.7vw,32px);line-height:.95;box-shadow:0 0 28px #fff,inset 0 0 30px #ff004c;cursor:pointer;animation:pulse .7s infinite alternate}.autoNote{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);font-family:Arial,sans-serif;font-weight:900;font-size:clamp(11px,3vw,15px);opacity:.75;z-index:10;text-align:center}#result{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:30;background:rgba(0,0,0,.30);padding:8px}#result.show{display:flex;animation:shake .1s infinite}#chug{font-size:clamp(58px,18vw,170px);line-height:.78;text-shadow:0 0 13px #fff,0 0 32px red,0 0 80px red;animation:mega .14s infinite alternate;letter-spacing:1px}.chosen{width:min(96vw,900px);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px}.nameBox{flex:1;min-width:0;background:linear-gradient(135deg,#ff004c,#ff8a00,#ffd000);border:5px solid #fff;border-radius:24px;padding:14px 8px;box-shadow:0 0 25px #fff,0 0 70px #ff004c;text-transform:uppercase;font-size:clamp(22px,6vw,60px);line-height:.9;text-shadow:0 0 10px #000,0 0 18px #fff;overflow:hidden;animation:pop .35s ease-out both,boxGlow .18s infinite alternate}.amp{font-size:clamp(34px,10vw,90px);text-shadow:0 0 20px #fff,0 0 40px gold;animation:mega .2s infinite alternate}#again{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:70;width:22%;height:22%;min-width:82px;min-height:82px;max-width:150px;max-height:150px;font-size:clamp(12px,3.6vw,22px);font-weight:900;border:4px solid white;background:#d60000;color:#fff;border-radius:50%;padding:8px;box-shadow:0 0 22px #fff,0 0 55px red,inset 0 0 18px #ff7a7a;cursor:pointer;line-height:.95;text-align:center;animation:againPulse .75s infinite alternate;text-shadow:0 0 8px #fff}.flash{animation:bgFlash .1s infinite}.laser:before,.laser:after{content:"";position:fixed;left:-30vw;top:50%;width:160vw;height:9px;background:#fff;box-shadow:0 0 18px #fff,0 0 65px #ff004c;z-index:25;pointer-events:none;opacity:.9;animation:laser .22s infinite alternate}.laser:before{transform:rotate(24deg)}.laser:after{transform:rotate(-24deg);animation-delay:.08s}#rain{position:fixed;inset:0;pointer-events:none;z-index:28;display:none;overflow:hidden}.drop{position:absolute;top:-40px;font-size:34px;animation:fall 1.6s linear infinite;text-shadow:0 0 10px white}canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:26}@keyframes pulse{to{transform:translate(-50%,-50%) scale(1.08)}}@keyframes againPulse{from{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 22px #fff,0 0 55px red,inset 0 0 18px #ff7a7a}to{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 35px #fff,0 0 95px #ff0000,inset 0 0 28px #fff}}@keyframes mega{from{transform:scale(1) rotate(-1deg)}to{transform:scale(1.15) rotate(1deg)}}@keyframes pop{0%{transform:scale(.25) rotate(-8deg);opacity:0}70%{transform:scale(1.12) rotate(2deg);opacity:1}100%{transform:scale(1)}}@keyframes boxGlow{to{box-shadow:0 0 35px white,0 0 95px gold}}@keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(10px,-7px)}50%{transform:translate(-9px,8px)}75%{transform:translate(7px,6px)}100%{transform:translate(0,0)}}@keyframes bgFlash{0%{background:#430000}35%{background:#fff;color:#000}70%{background:#a00000}100%{background:#000}}@keyframes laser{from{top:32%;opacity:.55}to{top:70%;opacity:1}}@keyframes fall{to{transform:translateY(115vh) rotate(380deg)}}@media(max-width:560px){.chosen{flex-direction:column;gap:5px}.nameBox{width:96vw;flex:none;padding:11px 8px}.amp{line-height:.65}.wheelStage{width:min(94vw,57vh);height:min(94vw,57vh)}#chug{font-size:clamp(54px,18vw,130px)}}@media(max-height:660px){.wheelStage{width:min(80vw,53vh);height:min(80vw,53vh)}#chug{font-size:clamp(42px,14vw,110px)}.nameBox{font-size:clamp(18px,5vw,42px);padding:8px 7px}.chosen{margin-top:6px}#brand{font-size:11px;padding:5px 9px}}
</style>
</head>
<body>
<div id="brand">MADE BY BAIDABOYS</div>
<div id="app">
 <div class="wheelStage" id="stage">
  <div class="pointer top"></div>
  <canvas id="wheelCanvas"></canvas>
  <div id="center">TRYKK<br>START</div>
  <button id="again">SPIN<br>PÅ NYTT</button>
  <div class="pointer bottom"></div>
 </div>
 <div class="autoNote" id="note">Trykk én gang for lyd og spin</div>
 <div id="result"><div id="chug">CHUGG!!!!</div><div class="chosen"><div class="nameBox" id="nameA"></div><div class="amp">&</div><div class="nameBox" id="nameB"></div></div></div>
</div>
<div id="rain"></div>
<canvas id="confetti"></canvas>
<audio id="song" src="song.mp4" preload="auto" playsinline></audio>
<script>
const names=["Alexander Nikolai Pedersen","Noah Mimon Jakobsen","Luckas Kuraas Eivik","Anders Hagen Gullbransen","Marius Kvensjø","Phillip Ingvart Akselsen","Fredrik Mikkelsen","Kasper Einås Eidum","Niklas Nilsen","Gabriel Clason","Luca Matheo Edvardsen","Matheo Fakking Mulitmilardær","Bartek Molinski","Mathias Eidisen","Dennis Sandvik","Henrik Ingebritsen","Tobias Harlund","Håvard Baustad","Omar Mballow","Leon Tretvoll","Casper Barosen","Magnus Sommerseth"];
const colors=['#ff004c','#ff8a00','#ffd000','#00c853','#00b0ff','#7c4dff','#ff00d4','#e60000'];
const canvas=document.getElementById('wheelCanvas'),ctx=canvas.getContext('2d'),stage=document.getElementById('stage'),center=document.getElementById('center'),note=document.getElementById('note'),result=document.getElementById('result'),nameA=document.getElementById('nameA'),nameB=document.getElementById('nameB'),song=document.getElementById('song'),again=document.getElementById('again'),rain=document.getElementById('rain');
const n=names.length,seg=2*Math.PI/n;let rotation=0,spinning=false,raf=0;
function resizeWheel(){const d=canvas.getBoundingClientRect().width;const scale=devicePixelRatio||1;canvas.width=d*scale;canvas.height=d*scale;ctx.setTransform(scale,0,0,scale,0,0);drawWheel(rotation)}
addEventListener('resize',resizeWheel);setTimeout(resizeWheel,50);
function drawWheel(rot){const w=canvas.getBoundingClientRect().width,cx=w/2,cy=w/2,r=w/2-8;ctx.clearRect(0,0,w,w);ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);for(let i=0;i<n;i++){
 const centerAngle=i*seg-Math.PI/2;
 const a0=centerAngle-seg/2,a1=centerAngle+seg/2;
 ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a0,a1);ctx.closePath();
 ctx.fillStyle=colors[i%colors.length];ctx.fill();
 ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,.86)';ctx.stroke();
 // Put the name in the MIDDLE of the colored slice, not on the dividing line.
 ctx.save();
 // Text is radial (loddrett) and centered inside each colored pizza slice.
 ctx.rotate(centerAngle);
 ctx.translate(r*.64,0);
 // Keep text readable, but still vertical/radial, not lying on the divider lines.
 if(centerAngle > Math.PI/2 || centerAngle < -Math.PI/2){ctx.rotate(Math.PI)}
 ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`900 ${Math.max(9,Math.min(16,w/34))}px Arial`;
 ctx.shadowColor='#000';ctx.shadowBlur=7;ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.75)';
 const first=names[i].split(' ')[0].toUpperCase();ctx.strokeText(first,0,0);ctx.fillText(first,0,0);ctx.restore()}
 ctx.beginPath();ctx.arc(0,0,r*.24,0,Math.PI*2);ctx.fillStyle='#100008';ctx.fill();ctx.lineWidth=5;ctx.strokeStyle='#fff';ctx.stroke();ctx.restore()}
function normRad(a){a%=Math.PI*2;return a<0?a+Math.PI*2:a}
function indexAtPointer(pointerAngle,rot){
 // Sectors are centered on i*seg - PI/2. Add half a segment before flooring.
 let local=normRad(pointerAngle-rot+Math.PI/2+seg/2);
 return Math.floor(local/seg)%n
}
function spin(){if(spinning)return;spinning=true;rotation=normRad(rotation);center.style.display='none';note.style.display='none';again.style.display='none';result.classList.remove('show');document.body.className='';rain.style.display='none';stage.style.opacity='1';stage.style.transform='scale(1)';stopConfetti();
 song.currentTime=0;song.play().catch(()=>{});
 // Choose a top name, then calculate rotation so the top pointer lands in the exact middle of that colored field.
 const topIdx=Math.floor(Math.random()*n);
 const targetCenterAngle=topIdx*seg-Math.PI/2;
 const pointerAngle=-Math.PI/2;
 const currentMod=normRad(rotation);
 const targetMod=normRad(pointerAngle-targetCenterAngle);
 let delta=normRad(targetMod-currentMod);
 const fastRounds=26; // exact same long, fast distance every single spin
 const total=delta+fastRounds*Math.PI*2;
 const start=rotation,duration=3000,t0=performance.now();
 function anim(now){const t=Math.min(1,(now-t0)/duration);rotation=normRad(start+total*t);drawWheel(rotation);if(t<1){raf=requestAnimationFrame(anim)}else{rotation=normRad(start+total);drawWheel(rotation);finishSpin()}}
 raf=requestAnimationFrame(anim)}
function finishSpin(){let top=indexAtPointer(-Math.PI/2,rotation);let bottom=indexAtPointer(Math.PI/2,rotation);if(top===bottom)bottom=(bottom+Math.floor(n/2))%n;nameA.textContent=names[top];nameB.textContent=names[bottom];result.classList.add('show');document.body.classList.add('flash','laser');stage.style.opacity='.14';stage.style.transform='scale(.82)';startConfetti();startRain();vibrate();setTimeout(endShow,10000)}
function endShow(){document.body.className='';result.classList.remove('show');rain.style.display='none';stage.style.opacity='1';stage.style.transform='scale(1)';again.style.display='block';spinning=false;stopConfetti();song.pause();song.currentTime=0;}
function startRain(){rain.innerHTML='';rain.style.display='block';for(let i=0;i<70;i++){const e=document.createElement('div');e.className='drop';e.textContent=['🍺','🍻','🔥','💥','⚡','🎉'][i%6];e.style.left=Math.random()*100+'vw';e.style.animationDelay=(Math.random()*1.4)+'s';e.style.animationDuration=(1.05+Math.random()*1.4)+'s';rain.appendChild(e)}}
function vibrate(){if(navigator.vibrate)navigator.vibrate([180,50,180,50,500,60,800,60,500])}
center.onclick=spin;again.onclick=spin;document.body.addEventListener('click',()=>{if(!spinning&&center.style.display!=='none')spin()},{once:false});resizeWheel();
const cf=document.getElementById('confetti'),cx=cf.getContext('2d');let particles=[],confettiRAF;function resizeC(){cf.width=innerWidth;cf.height=innerHeight}addEventListener('resize',resizeC);resizeC();
function startConfetti(){particles=[];for(let i=0;i<520;i++){particles.push({x:Math.random()*cf.width,y:-60-Math.random()*cf.height,vx:(Math.random()-.5)*14,vy:Math.random()*12+6,s:Math.random()*12+5,r:Math.random()*360,c:['#fff','#ffd000','#ff004c','#00e5ff','#00ff66','#ff8a00'][Math.floor(Math.random()*6)]})}confettiLoop()}
function confettiLoop(){cx.clearRect(0,0,cf.width,cf.height);for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.r+=18;if(p.y>cf.height+35){p.y=-35;p.x=Math.random()*cf.width}cx.save();cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore()}confettiRAF=requestAnimationFrame(confettiLoop)}
function stopConfetti(){cancelAnimationFrame(confettiRAF);cx.clearRect(0,0,cf.width,cf.height)}
</script>
</body>
</html>
