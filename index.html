<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BAIDABOYS27 CHUG WHEEL</title>
<style>
  :root{--bg1:#07020d;--bg2:#260016;--hot:#ff005d;--gold:#ffe600;--cyan:#00f7ff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:white;font-family:Arial Black,Impact,system-ui,sans-serif;}
  body{height:100svh;background:radial-gradient(circle at top,#4b0040 0%,#140017 34%,#020104 100%);}
  #app{position:relative;width:100vw;height:100svh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:10px 10px 12px;}
  .brand{position:absolute;right:10px;top:8px;z-index:20;font-size:clamp(10px,2.8vw,16px);letter-spacing:1px;color:#fff;text-shadow:0 0 12px var(--cyan),0 0 22px var(--hot);opacity:.95;}
  .title{font-size:clamp(26px,9vw,76px);line-height:.85;margin-top:8px;text-align:center;letter-spacing:1px;text-shadow:0 0 12px #fff,0 0 30px var(--hot),0 0 55px var(--cyan);animation:pulse 0.7s infinite alternate;}
  .subtitle{font-size:clamp(10px,3.1vw,18px);opacity:.9;margin-top:4px;letter-spacing:1px;color:#ffe600;text-shadow:0 0 10px #ff005d;}
  .wheels{width:100%;display:flex;gap:min(3vw,18px);align-items:center;justify-content:center;flex:1;min-height:0;margin-top:2px;}
  .wheelBox{position:relative;width:min(47vw,39svh);height:min(47vw,39svh);max-width:360px;max-height:360px;filter:drop-shadow(0 0 20px rgba(255,0,93,.55));}
  canvas{width:100%;height:100%;border-radius:50%;border:4px solid rgba(255,255,255,.9);background:#111;box-shadow:inset 0 0 18px #000,0 0 28px var(--hot);}
  .pointer{position:absolute;left:50%;top:-7px;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:34px solid #ffe600;filter:drop-shadow(0 0 8px #ff005d);z-index:8;}
  .pointer:after{content:"";position:absolute;left:-7px;top:-31px;width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 0 12px #fff;}
  .winnerPanel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:12;pointer-events:none;opacity:0;transform:scale(.7);}
  .winnerPanel.show{animation:boomIn .45s forwards, shake .13s infinite .45s;}
  .smallChosen{font-size:clamp(16px,5vw,38px);color:#fff;text-shadow:0 0 12px #fff,0 0 26px var(--cyan);line-height:.95;margin:4px 0;max-width:96vw;text-transform:uppercase;}
  .chug{font-size:clamp(48px,17vw,140px);line-height:.78;color:#fff;text-shadow:0 0 10px #fff,0 0 28px var(--hot),0 0 60px #ff0000;animation:chugPulse .18s infinite alternate;}
  .vs{font-size:clamp(16px,5vw,36px);color:var(--gold);text-shadow:0 0 14px #ff005d;margin:4px 0;}
  #again{display:none;z-index:30;margin-bottom:4px;border:0;border-radius:999px;padding:12px 26px;font-family:Arial Black,Impact,sans-serif;font-size:clamp(17px,4vw,26px);color:#08000b;background:linear-gradient(90deg,#ffe600,#00f7ff,#ff005d);box-shadow:0 0 22px rgba(255,255,255,.65);cursor:pointer;}
  #tap{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;background:rgba(0,0,0,.62);font-size:clamp(24px,8vw,62px);text-shadow:0 0 20px #ff005d;}
  .flash{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;mix-blend-mode:screen;}
  .flash.on{animation:flash .16s infinite;}
  .confetti{position:absolute;width:10px;height:18px;top:-20px;z-index:15;animation:fall linear forwards;}
  .shakeAll{animation:shake .08s infinite;}
  @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.04)}}
  @keyframes boomIn{to{opacity:1;transform:scale(1)}}
  @keyframes chugPulse{from{transform:scale(1) rotate(-1deg)}to{transform:scale(1.08) rotate(1deg)}}
  @keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(3px,-2px)}50%{transform:translate(-3px,2px)}75%{transform:translate(2px,3px)}}
  @keyframes flash{0%{opacity:.15;background:#ff005d}50%{opacity:.55;background:#fff}100%{opacity:.18;background:#00f7ff}}
  @keyframes fall{to{transform:translateY(110svh) rotate(720deg);opacity:.9}}
  @media (max-height:650px){.title{font-size:clamp(22px,7vw,52px)}.subtitle{display:none}.wheelBox{width:min(43vw,34svh);height:min(43vw,34svh)}#again{padding:9px 20px}}
</style>
</head>
<body>
<audio id="song" src="song.mp4" preload="auto" playsinline></audio>
<div id="app">
  <div class="brand">BAIDABOYS27</div>
  <div>
    <div class="title">CHUG WHEEL</div>
    <div class="subtitle">To navn velges på 3 sekunder</div>
  </div>
  <div class="wheels">
    <div class="wheelBox"><div class="pointer"></div><canvas id="wheel1"></canvas></div>
    <div class="wheelBox"><div class="pointer"></div><canvas id="wheel2"></canvas></div>
  </div>
  <button id="again">SPIN PÅ NYTT</button>
  <div class="winnerPanel" id="winnerPanel">
    <div class="chug">CHUGG!!!!</div>
    <div class="smallChosen" id="winnerA"></div>
    <div class="vs">+</div>
    <div class="smallChosen" id="winnerB"></div>
  </div>
  <div class="flash" id="flash"></div>
  <div id="tap">TRYKK ÉN GANG<br>FOR Å STARTE LYD</div>
</div>
<script>
const names=[
'Alexander Nikolai Pedersen','Noah Mimon Jakobsen','Luckas Kuraas Eivik','Anders Hagen Gullbransen','Marius Kvensjø','Phillip Ingvart Akselsen','Fredrik Mikkelsen','Kasper Einås Eidum','Niklas Nilsen','Gabriel Clason','Luca Matheo Edvardsen','Matheo Fakking Mulitmilardær','Bartek Molinski','Mathias Eidisen','Dennis Sandvik','Henrik Ingebritsen','Tobias Harlund','Håvard Baustad','Omar Mballow','Leon Tretvoll','Casper Barosen','Magnus Sommerseth'
];
const colors=['#ff005d','#00f7ff','#ffe600','#7cff00','#ff7a00','#9d00ff','#00ff9d','#ff2b2b'];
const song=document.getElementById('song'), app=document.getElementById('app'), flash=document.getElementById('flash'), tap=document.getElementById('tap'), again=document.getElementById('again');
const panel=document.getElementById('winnerPanel'), winnerA=document.getElementById('winnerA'), winnerB=document.getElementById('winnerB');
let c1=document.getElementById('wheel1'), c2=document.getElementById('wheel2');
let rot1=0, rot2=0, animating=false;
function sizeCanvas(c){const dpr=window.devicePixelRatio||1;const r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=r.height*dpr;}
function drawWheel(c,rot){sizeCanvas(c);const ctx=c.getContext('2d');const W=c.width,H=c.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-8;ctx.clearRect(0,0,W,H);const n=names.length,seg=Math.PI*2/n;ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,i*seg,(i+1)*seg);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.rotate(i*seg+seg/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font=`900 ${Math.max(12,W/43)}px Arial`;ctx.shadowColor='#000';ctx.shadowBlur=5;let t=names[i].split(' ')[0];ctx.fillText(t,R-10,4);ctx.restore();}ctx.restore();ctx.beginPath();ctx.arc(cx,cy,R*.18,0,Math.PI*2);ctx.fillStyle='#09000f';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`900 ${Math.max(14,W/23)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#ff005d';ctx.shadowBlur=12;ctx.fillText('CHUG',cx,cy);}
function indexAtPointer(rot){const n=names.length,seg=Math.PI*2/n;const pointer=-Math.PI/2;let a=(pointer-rot)%(Math.PI*2);if(a<0)a+=Math.PI*2;return Math.floor(a/seg)%n;}
function targetRotationForIndex(idx,baseSpins){const n=names.length,seg=Math.PI*2/n;const pointer=-Math.PI/2;const center=idx*seg+seg/2;return pointer-center + baseSpins*Math.PI*2;}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function pickTwo(){let a=Math.floor(Math.random()*names.length),b;do{b=Math.floor(Math.random()*names.length)}while(b===a);return [a,b];}
function confetti(seconds=10){const end=Date.now()+seconds*1000;const timer=setInterval(()=>{for(let i=0;i<12;i++){let el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.animationDuration=(1.2+Math.random()*1.7)+'s';el.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}if(Date.now()>end)clearInterval(timer)},120)}
function resetVisuals(){panel.classList.remove('show');flash.classList.remove('on');app.classList.remove('shakeAll');again.style.display='none';winnerA.textContent='';winnerB.textContent='';}
async function playMusic(){song.pause();song.currentTime=0;try{await song.play();tap.style.display='none';return true;}catch(e){tap.style.display='flex';return false;}}
function startShow(){if(animating)return;animating=true;resetVisuals();playMusic();const [a,b]=pickTwo();const start1=rot1,start2=rot2;const end1=targetRotationForIndex(a,5);const end2=targetRotationForIndex(b,6);const start=performance.now(),spinDur=3000,total=13000;function frame(now){let t=Math.min(1,(now-start)/spinDur),e=easeOutCubic(t);rot1=start1+(end1-start1)*e;rot2=start2+(end2-start2)*e;drawWheel(c1,rot1);drawWheel(c2,rot2);if(t<1){requestAnimationFrame(frame)}else{rot1=end1;rot2=end2;drawWheel(c1,rot1);drawWheel(c2,rot2);let ia=indexAtPointer(rot1),ib=indexAtPointer(rot2);winnerA.textContent=names[ia].toUpperCase();winnerB.textContent=names[ib].toUpperCase();panel.classList.add('show');flash.classList.add('on');app.classList.add('shakeAll');if(navigator.vibrate)navigator.vibrate([200,80,200,80,400]);confetti(10);setTimeout(()=>{panel.classList.remove('show');flash.classList.remove('on');app.classList.remove('shakeAll');again.style.display='block';animating=false;song.pause();song.currentTime=0;},total-spinDur);}}
requestAnimationFrame(frame);}
window.addEventListener('resize',()=>{drawWheel(c1,rot1);drawWheel(c2,rot2)});
again.addEventListener('click',startShow);
tap.addEventListener('click',()=>{tap.style.display='none';startShow();});
drawWheel(c1,0);drawWheel(c2,0);
setTimeout(startShow,250);
</script>
</body>
</html>
